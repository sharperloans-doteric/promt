<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Access</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 100%; 
            text-align: center; 
        }
        h2 { color: #333; margin-bottom: 0.5rem; font-size: 1.15rem; line-height: 1.3; }
        p { color: #666; margin-bottom: 1.2rem; }
        .price-tag { font-size: 1.7rem; font-weight: bold; color: #0070ba; margin: 1rem 0; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            font-size: 1rem; 
        }
        button { 
            width: 100%; 
            padding: 13px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 1.05rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { 
            margin-top: 20px; 
            padding: 14px; 
            border-radius: 6px; 
            min-height: 75px; 
            font-size: 0.95rem; 
            line-height: 1.45; 
        }
        .success { background: #e6f4ea; color: #28a745; }
        .error { background: #f8d7da; color: #dc3545; }
        .info { background: #e6f0fa; color: #0070ba; }
        .loader { 
            display: inline-block; width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 1s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Do not refresh the page after entering your M-Pesa PIN.<br>Wait until you are redirected.</h2>
    <p>Please pay to access <strong>option to create new account</strong></p>
    
    <span class="price-tag">KES 30.00</span>
    
    <input type="text" id="phone" placeholder="0712345678" maxlength="12">
    <button id="payBtn" onclick="handlePayment()">Pay with M-Pesa</button>

    <div id="status"></div>
</div>

<script>
    const BACKEND_URL = "https://parero.vercel.app";

    let pollTimer = null;

    function showStatus(message, type = "info") {
        const div = document.getElementById('status');
        div.className = type;
        div.innerHTML = message;
    }

    function resetButton() {
        const btn = document.getElementById('payBtn');
        btn.disabled = false;
        btn.innerText = "Pay with M-Pesa";
    }

    async function handlePayment() {
        const phone = document.getElementById('phone').value.trim();
        const btn = document.getElementById('payBtn');

        if (!phone || phone.length < 9) {
            showStatus("❌ Please enter a valid phone number", "error");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Sending STK Push...';
        showStatus("STK Push sent.<br>Check your phone and enter M-Pesa PIN.", "info");

        try {
            const res = await fetch(`${BACKEND_URL}/api/stk-push`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "ngrok-skip-browser-warning": "true"
                },
                body: JSON.stringify({ amount: 3, phone_number: phone })
            });

            const data = await res.json();

            if (data.success) {
                startPolling();
            } else {
                showStatus("❌ Failed to start payment", "error");
                resetButton();
            }
        } catch (err) {
            showStatus("❌ Connection error. Is ngrok running?", "error");
            resetButton();
        }
    }

    function startPolling() {
        let attempts = 0;
        const maxAttempts = 50;   // ~2.5 minutes

        if (pollTimer) clearInterval(pollTimer);

        pollTimer = setInterval(async () => {
            attempts++;

            try {
                const res = await fetch(`${BACKEND_URL}/api/status`, {
                    headers: { "ngrok-skip-browser-warning": "true" }
                });

                const data = await res.json();

                // We have a real callback
                if (data.status === true && data.response) {
                    const code = data.response.ResultCode;

                    if (code === 0) {
                        // SUCCESS
                        clearInterval(pollTimer);
                        showStatus("<strong>✅ Payment Successful!</strong><br>Redirecting you now...", "success");
                        setTimeout(() => {
                            window.location.href = "vocher.html";
                        }, 1800);
                        return;
                    } 
                    else if (code === 1032) {
                        // This is the final cancellation
                        clearInterval(pollTimer);
                        showStatus("❌ Payment was cancelled.<br>Please try again.", "error");
                        resetButton();
                        return;
                    } 
                    else {
                        // Other failures (wrong PIN, etc.)
                        clearInterval(pollTimer);
                        let msg = data.response.ResultDesc || "Payment failed";
                        if (code === 2001) msg = "Wrong M-Pesa PIN entered.";
                        showStatus(`❌ ${msg}`, "error");
                        resetButton();
                        return;
                    }
                }

                // Timeout
                if (attempts >= maxAttempts) {
                    clearInterval(pollTimer);
                    showStatus("⏰ Request timed out.<br>Check your M-Pesa or try again.", "error");
                    resetButton();
                }

            } catch (err) {
                console.error("Polling error:", err);
            }
        }, 3000);
    }

    // Enter key support
    document.getElementById('phone').addEventListener('keypress', (e) => {
        if (e.key === "Enter") handlePayment();
    });
</script>

</body>
</html>
